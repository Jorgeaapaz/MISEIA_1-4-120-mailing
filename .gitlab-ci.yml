stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: mailing-saas
  DOCKER_TLS_CERTDIR: "/certs"

lint-and-test:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm run test
    - npm run test:coverage
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'

build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker info
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker save $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA | gzip > mailing-saas.tar.gz
  artifacts:
    paths:
      - mailing-saas.tar.gz
    expire_in: 1 hour
  only:
    - master

deploy-to-vm:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$VM_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts
  script:
    - scp mailing-saas.tar.gz $VM_USER@$VM_HOST:~/MISEIA120_mailing/
    - scp docker-compose.prod.yml $VM_USER@$VM_HOST:~/MISEIA120_mailing/
    - |
      ssh $VM_USER@$VM_HOST << 'ENDSSH'
        set -e
        cd ~/MISEIA120_mailing
        docker load < mailing-saas.tar.gz
        docker tag mailing-saas:$(docker images mailing-saas --format "{{.Tag}}" | head -1) mailing-saas:latest
        docker compose -f docker-compose.prod.yml up -d --force-recreate
        docker image prune -f
      ENDSSH
  only:
    - master
  needs:
    - build-image
  environment:
    name: production
    url: https://mailing.deviaaps.com
