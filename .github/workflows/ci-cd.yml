name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Coverage report
        run: npm run test:coverage
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  build-and-deploy:
    name: Build Docker Image & Deploy to GCI VM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mailing-saas:${{ github.sha }} .

      - name: Save and compress image
        run: docker save mailing-saas:${{ github.sha }} | gzip > mailing-saas.tar.gz

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer image to VM
        run: |
          scp mailing-saas.tar.gz ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/MISEIA120_mailing/
          scp docker-compose.prod.yml ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/MISEIA120_mailing/

      - name: Deploy on VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e
            cd ~/MISEIA120_mailing
            docker load < mailing-saas.tar.gz
            docker tag mailing-saas:$(docker images mailing-saas --format "{{.Tag}}" | head -1) mailing-saas:latest
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            docker image prune -f
          EOF
